<body>

<!-- (ALL YOUR HTML ABOVE REMAINS EXACTLY SAME UNTIL THE INPUT LINE) -->

<input type="text" id="delegateID" placeholder="Enter ID (e.g. HRC01)" class="input" autocomplete="off" spellcheck="false">

<!-- (rest of HTML same) -->

<script>

/* ================= REAL HRC DATABASE ================= */
const delegates = {
 "HRC01": { country: "United States of America", name: "Syed Arahan" },
 "HRC02": { country: "Russian Federation", name: "Jyash Ashish Tholiya" },
 "HRC03": { country: "Islamic Republic of Iran", name: "Jhanvi Ranjan" },
 "HRC04": { country: "United Kingdom", name: "Kartikeya Deshmukh" },
 "HRC05": { country: "Kingdom of the Netherlands", name: "Arayna Chharia" },
 "HRC06": { country: "Federal Republic of Germany", name: "Advait Karthikeyan" },
 "HRC07": { country: "New Zealand", name: "Grishma Kshirsagar" },
 "HRC08": { country: "Canada", name: "Anish Dasgupta" },
 "HRC09": { country: "People's Republic of China", name: "Siddharth Dongre" },
 "HRC10": { country: "State of Palestine", name: "Shravya Pankaj Patil" }
};

function findPortfolio(){
  const id=document.getElementById("delegateID").value.trim().toUpperCase();
  const r=document.getElementById("result");
  
  clearInterval(typingInterval);
  r.innerHTML = "";
  
  let resultText = "";
  
  if(!id.match(/^HRC\d{2}$/)){
    resultText = "Error: Invalid format.\nPlease use HRC followed by 2 digits (e.g. HRC01)";
    r.style.color = "#ff4757";
  }
  else if(delegates[id]){
    resultText = `Authentication Successful.\nDelegate: ${delegates[id].name}\nAllotment: ${delegates[id].country}`;
    r.style.color = "#00d4ff";
  }
  else{
    resultText = "Error: ID not found in registry.";
    r.style.color = "#ff4757";
  }

  let i = 0;
  r.innerHTML = '<span class="typing-cursor"></span>';
  
  typingInterval = setInterval(() => {
    if (i < resultText.length) {
      let currentText = resultText.substring(0, i + 1).replace(/\n/g, "<br>");
      r.innerHTML = currentText + '<span class="typing-cursor"></span>';
      i++;
    } else {
      clearInterval(typingInterval);
    }
  }, 40); 
}

document.getElementById("delegateID").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    findPortfolio();
  }
});
</script>

</body>
</html>
