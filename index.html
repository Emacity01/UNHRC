<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNHRC | Emacity MUN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0c1428;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:600px;
  background:#000;
  border-radius:10px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
}

input{
  width:70%;
  padding:10px;
  background:black;
  border:1px solid #333;
  color:white;
}

button{
  padding:10px 18px;
  background:#00d4ff;
  border:none;
  color:black;
  font-weight:700;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-family:monospace;
  color:#00d4ff;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="card">
  <h2>Delegate Authentication Terminal</h2>
  <br>
  <input type="text" id="delegateID" placeholder="Enter ID (e.g. HRC01)">
  <button onclick="findPortfolio()">Search</button>
  <div class="result" id="result"></div>
</div>

<script>
const delegates = {
 "HRC01": { country: "United States of America", name: "Syed Arahan" },
 "HRC02": { country: "Russian Federation", name: "Jyash Ashish Tholiya" },
 "HRC03": { country: "Islamic Republic of Iran", name: "Jhanvi Ranjan" },
 "HRC04": { country: "United Kingdom", name: "Kartikeya Deshmukh" },
 "HRC05": { country: "Kingdom of the Netherlands", name: "Arayna Chharia" },
 "HRC06": { country: "Federal Republic of Germany", name: "Advait Karthikeyan" },
 "HRC07": { country: "New Zealand", name: "Grishma Kshirsagar" },
 "HRC08": { country: "Canada", name: "Anish Dasgupta" },
 "HRC09": { country: "People's Republic of China", name: "Siddharth Dongre" },
 "HRC10": { country: "State of Palestine", name: "Shravya Pankaj Patil" },
"HRC11": { country: "French Republic", name: "Vallabh Borawake" },
"HRC12": { country: "State of Israel", name: "Rajsi Rajendra Takale" },
"HRC13": { country: "Republic of South Africa", name: "Rutvij Rajendra Takale" },
"HRC14": { name:"Atharva Saraf", country:"India" },
"HRC15": { name:"Advait Chidhanand", country:"Indonesia" },
"HRC16": { name:"Saish Saiprasad Chigare", country:"Bangladesh" },
"HRC17": { name:"Ananya Shinde", country:"Norway" }
};

function findPortfolio(){
  const id=document.getElementById("delegateID").value.trim().toUpperCase();
  const r=document.getElementById("result");

  if(!id.match(/^HRC\d{2}$/)){
    r.style.color="#ff4757";
    r.textContent="Error: Invalid format.\nPlease use HRC followed by 2 digits (e.g. HRC01)";
  }
  else if(delegates[id]){
    r.style.color="#00d4ff";
    r.textContent=`Authentication Successful.
Delegate: ${delegates[id].name}
Allotment: ${delegates[id].country}`;
  }
  else{
    r.style.color="#ff4757";
    r.textContent="Error: ID not found in registry.";
  }
}
</script>

</body>
</html>
